<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Prism - Structure</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="main-logic.js"></script>
    <script src="interactions.js"></script>
</head>
<body>

<a-scene pc-logic>
  <a-assets>
    <a-asset-item id="Bureau" src="Desk.glb"></a-asset-item>
    <a-asset-item id="Moniteur" src="Monitor.glb"></a-asset-item>
    <a-asset-item id="Ram" src="RAM.glb"></a-asset-item>
    <a-asset-item id="Gpu" src="Graphics card.glb"></a-asset-item>
    <a-asset-item id="Chaise" src="Office Chair.glb"></a-asset-item>
    <a-asset-item id="panier" src="Dog Bed.glb"></a-asset-item>
    <a-asset-item id="Canape" src="Couch Medium.glb"></a-asset-item>
    <a-asset-item id="table" src="Coffee Table.glb"></a-asset-item>
    <a-asset-item id="Tv" src="Tv.glb"></a-asset-item>
    <a-asset-item id="clavier" src="Keyboard.glb"></a-asset-item>
    <a-asset-item id="souris" src="Computer mouse.glb"></a-asset-item>


    <img id="windows" src="https://i.imgur.com/w9BNo86.png">
    <a-image id="logo" src="ipssi-logo-2025.png"></a-image>
  </a-assets>

  <a-entity camera look-controls wasd-controls="acceleration: 20" position="0 1.6 0">
    <a-cursor color="springgreen" raycaster="objects: .raycastable; far: 4"></a-cursor>
    <a-text id="hud-texte" value="" position="0 -0.15 -0.4" scale="0.12 0.12 0.12" align="center" color="yellow" visible="false"></a-text>
  </a-entity>

  <a-entity gltf-model="#Bureau" position="0 0 -4" scale="2 2 2"></a-entity>
  <a-entity id="Moniteur-Entity" gltf-model="#Moniteur" position="0 0.86 -4" scale="2.5 2.5 2.5">
      <a-plane id="ecran-pc" position="0 0.22 0.05" width="0.5" height="0.3" src="#windows" visible="false"></a-plane>
  </a-entity>
  <a-entity gltf-model="#clavier" position="0 0.88 -3.65" rotation="0 180 0" scale="0.0015 0.0015 0.0015"></a-entity>
    <a-entity gltf-model="#souris" position="0.5 0.88 -3.6" rotation="0 180 0" scale="0.04 0.04 0.04"></a-entity>
  <a-entity gltf-model="#Chaise" position="0 0 -3" rotation="0 180 0" scale="1.3 1.3 1.3"></a-entity>

  <a-entity id="tour-pc" position="1 1.2 -4">
    <a-box width="0.25" height="0.5" depth="0.5" color="#111" opacity="0.7"></a-box>

    <a-box id="vitre" class="raycastable" interactif="type: vitre" 
           position="0.126 0.004 0" width="0.02" height="0.48" depth="0.48" 
           color="#88CCFF" opacity="0.3"></a-box>

    <a-entity gltf-model="#Gpu" position="0 0 0" rotation="0 90 0" scale="0.05 0.05 0.05"></a-entity>

    <a-entity id="ram" class="raycastable" interactif="type: ram" 
              gltf-model="#Ram" position="-0.05 0.15 0" rotation="0 90 0" scale="0.05 0.05 0.05"></a-entity>
    
    <a-sphere id="power-btn" class="raycastable" interactif="type: power" 
              position="0 0.15 0.26" radius="0.03" color="red"></a-sphere>
  </a-entity>

  <a-cylinder id="cable-alim" class="raycastable" interactif="type: cable" 
              position="1 0.9 -4.60" rotation="70 0 0" radius="0.01" height="0.8" color="#111">
  </a-cylinder>

  <a-entity id="prise-secteur" position="1 0.77 -4.98">
    <a-box width="0.12" height="0.12" depth="0.02" color="#FFFFFF"></a-box>
    <a-cylinder rotation="90 0 0" position="0 0 0.01" radius="0.04" height="0.01" color="#F0F0F0"></a-cylinder>
  </a-entity>

  <a-entity gltf-model="#panier" 
            position="4.5 0 -3" 
            rotation="0 180 0"
            scale="0.7 0.7 0.7">
    </a-entity>

    <a-entity gltf-model="#Canape" 
            position="-4.2 0 1.5" 
            rotation="0 90 0"
            scale="0.5 0.5 0.5">
    </a-entity>

    <a-entity gltf-model="#Canape" 
            position="-1 0 1.5" 
            rotation="0 270 0"
            scale="0.5 0.5 0.5">
    </a-entity>   

    <a-entity gltf-model="#table" 
            position="-2.5 0 1.5" 
            rotation="0 90 0"
            scale="1.8 1.8 1.8">
    </a-entity>

    <a-entity gltf-model="#Tv" 
            position="0.5 2.5 -5" 
            rotation="0 180 0"
            scale="1 1 1">

            <a-plane src="#logo"
             position="0 0 -0.05" 
              rotation="0 180 0"
             width="2.15" 
             height="1.15" 
             material="shader:flat; side: double"></a-plane>
    </a-entity>


  <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#444"></a-plane>
  <a-plane position="0 2 -5" width="10" height="4" color="#e5e5e5"></a-plane>

  <a-entity light="type: ambient; intensity: 0.5"></a-entity>
  <a-entity light="type: directional; intensity: 0.6" position="-1 4 3"></a-entity>
</a-scene>

</body>
</html>
