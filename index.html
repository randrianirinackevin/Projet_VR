<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>


<a-scene>
  <a-assets>
    <a-asset-item id="Bureau" src="Desk.glb"></a-asset-item>
    <a-asset-item id="Moniteur" src="Monitor.glb"></a-asset-item>
    <a-asset-item id="Tour" src="Gaming Computer.glb"></a-asset-item>
  </a-assets>

  <a-entity camera 
            look-controls 
            wasd-controls="acceleration: 20; fly: true" 
            position="0 0.85 0">
  </a-entity>

  <a-entity gltf-model="#Bureau" 
            position="0 0 -2" 
            rotation="0 0 0"
            scale="1 1 1">
  </a-entity>

  <a-entity gltf-model="#Moniteur" 
            position="0 0.43 -2" 
            rotation="0 0 0"
            scale="1 1 1">
  </a-entity>

  <a-entity gltf-model="#Tour" 
            position="0.6 0.63 -2" 
            rotation="0 90 0"
            scale="0.18 0.18 0.18">
  </a-entity>

  <a-entity id="room">
  <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#444444"></a-plane>
  
  <a-plane position="0 4 0" rotation="90 0 0" width="10" height="10" color="#ffffff"></a-plane>

  <a-plane position="0 2 -5" rotation="0 0 0" width="10" height="4" color="#e5e5e5"></a-plane>
  
  <a-plane position="0 2 5" rotation="0 180 0" width="10" height="4" color="#e5e5e5"></a-plane>
  
  <a-plane position="-5 2 0" rotation="0 90 0" width="10" height="4" color="#d1d1d1"></a-plane>
  
  <a-plane position="5 2 0" rotation="0 -90 0" width="10" height="4" color="#d1d1d1"></a-plane>
</a-entity>

<a-entity light="type: ambient; intensity: 0.5"></a-entity>
<a-entity light="type: directional; intensity: 0.6" position="-1 4 3"></a-entity>

</a-scene>


</body>
</html>
